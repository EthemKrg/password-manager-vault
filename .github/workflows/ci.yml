name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build and Validate
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore
        run: dotnet restore PasswordManager.slnx

      - name: Restore Windows app runtime
        run: dotnet restore src\PasswordManager.App\PasswordManager.App.csproj --runtime win-x64

      - name: Build
        run: dotnet build PasswordManager.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test PasswordManager.slnx --configuration Release --no-build

      - name: Run infrastructure validation
        run: dotnet run --project tests\PasswordManager.Infrastructure.Validation\PasswordManager.Infrastructure.Validation.csproj --configuration Release --no-build

      - name: Check vulnerable packages
        run: dotnet list PasswordManager.slnx package --include-transitive --vulnerable
